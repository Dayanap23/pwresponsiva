<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<style>
body {
  background: linear-gradient(to right, #D3D3D3, #D3D3D3);
  font-family: 'Trebuchet MS', sans-serif;
  text-align: center;
  margin: 0;
  padding-top: 80px; 
}

h1 {
  color: #1e3a8a;
  margin-top: 20px;
}

.contenedor {
  width: 60%;
  margin: 20px auto;
}

.card {
  background-color: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
  animation: aparecer 1s forwards;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

ul {
  list-style: none;
  padding: 0;
}

li {
  margin-top: 15px;
}

label {
  display: inline-block;
  width: 100px;
  text-align: right;
  margin-right: 10px;
}

input, textarea {
  width: 60%;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #999;
}

input:focus, textarea:focus {
  border-color: #1e3a8a;
  outline: none;
}

textarea {
  height: 80px;
}

button, .boton {
  margin-top: 15px;
  padding: 10px 20px;
  background-color: #1e3a8a;
  color: white;
  border: none;
  border-radius: 8px;
  text-decoration: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover, .boton:hover {
  background-color: #0f172a;
}

nav {
  background-color: #4f4fb3;
  position: fixed;
  top: 0;
  width: 100%;
  padding: 10px 0;
  box-shadow: 0px 2px 8px rgba(0,0,0,0.3);
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap; 
}

nav ul li {
  margin: 5px 15px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

nav ul li a:hover {
  color: #facc15;
}
</style>
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">Inicio</a></li>
    <li><a href="Generales.html">Generales</a></li>
    <li><a href="Academico.html">Academico</a></li>
    <li><a href="Laborales.html">Laborales</a></li>
    <li><a href="Hobbies.html">Hobbies</a></li> 
    <li><a href="Referencias.html">Referencias</a></li> 
    <li><a href="Registro.html">Registro</a></li> 
  </ul>
</nav>

<h1>Registro de Contacto</h1>

<div class="contenedor">
  <div class="card">

    <form action="https://formspree.io/f/xeevebao" method="POST">

      <input type="hidden" name="_subject" value="Nuevo mensaje desde tu CV">
      <input type="hidden" name="_captcha" value="false">

      <ul>
        <li>
          <label>Nombre:</label>
          <input type="text" name="name" required>
        </li>

        <li>
          <label>Correo:</label>
          <input type="email" name="email" required>
        </li>

        <li>
          <label>Mensaje:</label>
          <textarea name="message" required></textarea>
        </li>

        <li>
          <button type="submit">Enviar</button>
        </li>
      </ul>

    </form>

    <a href="index.html" class="boton">Volver al Inicio</a>

  </div>
</div>

<script>
        document.getElementById("menu-toggle").onclick=function () {
            document.getElementById("nav-links").classList.toggle("active");
        };
    </script>

</body>
</html>
